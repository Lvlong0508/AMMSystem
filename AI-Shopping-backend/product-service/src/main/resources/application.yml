# ============================================================
# Product Service 基础配置
# ============================================================
server:
  # 商品服务端口
  port: 8081

# ============================================================
# Spring 应用与基础设施配置
# ============================================================
spring:
  application:
    # 注册到 Nacos 的服务名
    name: product-service

  datasource:
    # 商品服务数据库
    url: jdbc:mysql://localhost:3306/eureka_product?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  servlet:
    multipart:
      # Spring Multipart 上传限制，需大于等于业务图片限制 app.image.max-file-size
      max-file-size: 10MB
      max-request-size: 10MB
  cloud:
    nacos:
      discovery:
        server-addr: 10.200.97.197:8848

# ============================================================
# 业务参数配置
# ============================================================
order:
  timeout:
    # 订单支付超时时间；库存预占过期时间也使用该值
    payment-minutes: 30

# ============================================================
# MyBatis 配置
# ============================================================
mybatis:
  # 实体类别名扫描路径
  type-aliases-package: com.gzasc.aishopping.product.model
  configuration:
    # 数据库下划线字段自动映射为 Java 驼峰属性
    map-underscore-to-camel-case: true
    default-executor-type: simple
    # 开发期打印 SQL；生产环境可按需关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ============================================================
# 应用自定义配置
# ============================================================
app:
  image:
    # 返回给前端的图片访问基础地址
    base-url: http://localhost:8081
    # 业务层图片大小限制；支持 5MB、512KB、1048576B 等 DataSize 格式
    max-file-size: 5MB
    # 商品图片物理存储目录
    storage-path: ${project.root:./AI-Shopping-backend}/static/image/goods/main
    # 静态资源映射根目录，对应 /image/** 访问路径
    resource-location: file:${project.root:./AI-Shopping-backend}/static/image/

  scheduler:
    reservation:
      # 库存预占清理任务开关；运行中修改该值，下次任务触发时生效
      enabled: true
      # 清理任务触发间隔，单位毫秒；修改该值通常需要重启服务才会重新注册调度频率
      fixed-rate: 120000
      # 运行时动态读取开关的 yml 文件路径
      config-path: src/main/resources/application.yml

