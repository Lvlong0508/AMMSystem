server:
  port: 8083

spring:
  application:
    name: contact-service
  datasource:
    url: jdbc:mysql://localhost:3306/eureka_contact?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  cloud:
    nacos:
      discovery:
        server-addr: 10.200.97.197:8848

mybatis:
  type-aliases-package: com.gzasc.aishopping.contact.model
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-executor-type: simple
