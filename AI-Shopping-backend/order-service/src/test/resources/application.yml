spring:
  datasource:
    url: jdbc:mysql://localhost:3306/eureka_order?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  cloud:
    discovery:
      enabled: false
    config:
      enabled: false

spring:
  cloud:
    nacos:
      discovery:
        enabled: false

mybatis:
  type-aliases-package: com.gzasc.aishopping.order.model
  configuration:
    map-underscore-to-camel-case: true
    default-executor-type: simple

order:
  task:
    timeout:
      enabled: false
  fallback:
    dir: ${java.io.tmpdir}/order-fallback-test
  stream:
    key: order:events
    group: order:processors
