# 端口配置
server:
  port: 8080

# 数据库配置
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_shopping?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# 通义千问配置
langchain4j:
  dashscope:
    chat-model:
      api-key: sk-04f193be640441ecb82410f96a686368
      model-name: qwen3.6-flash-2026-04-16
      enable-search: false
      temperature: 0.7

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.gzasc.aishopping.model
  configuration:
    map-underscore-to-camel-case: true