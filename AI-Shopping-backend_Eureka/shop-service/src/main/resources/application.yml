server:
  port: 8087

spring:
  application:
    name: shop-service
  datasource:
    url: jdbc:mysql://localhost:3306/eureka_shop?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:123456}

mybatis:
  type-aliases-package: com.gzasc.aishopping.shop.model
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}