server:
  port: 8087

spring:
  application:
    name: shop-service
  datasource:
    url: jdbc:mysql://localhost:3306/eureka_shop?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${DB_PASSWORD:123456}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  type-aliases-package: com.gzasc.aishopping.shop.model
  configuration:
    map-underscore-to-camel-case: true

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

app:
  image:
    base-url: http://localhost:8087
    storage-path: ${project.root:./AI-Shopping-backend_Eureka}/static/image/shop/logo
    resource-location: file:${project.root:./AI-Shopping-backend_Eureka}/static/image/
