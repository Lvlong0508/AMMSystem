spring:
  cloud:
    gateway:
      enabled: true
      routes:
        - id: test-all
          uri: http://localhost:1
          predicates:
            - Path=/**
      discovery:
        locator:
          enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
eureka:
  client:
    enabled: false
ip-rate-limit:
  max-requests: 300
  time-window-seconds: 60
