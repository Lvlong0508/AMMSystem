server:
  port: 0

spring:
  application:
    name: gateway-service-test
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: test-route
          uri: http://localhost:8081
          predicates:
            - Path=/test/**

sa-token:
  token-name: satoken
  timeout: 2592000
  is-cookie: false
  is-header: true

ip-rate-limit:
  max-requests: 5
  time-window-seconds: 60

eureka:
  client:
    enabled: false

logging:
  level:
    com.gzasc.aishopping.gateway: DEBUG
