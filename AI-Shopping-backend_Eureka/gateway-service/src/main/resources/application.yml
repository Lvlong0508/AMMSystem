server:
  port: 8080

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600
      routes:
        # ========== 用户端路由 ==========
        # 用户认证服务
        - id: user-auth
          uri: lb://auth-service
          predicates:
            - Path=/api/user/auth/**
        
        # 用户商品服务
        - id: user-product
          uri: lb://product-service
          predicates:
            - Path=/api/user/product/**
          filters:
            - RewritePath=/api/user/product/(?<segment>.*), /api/user/product/${segment}
        
        # 用户订单服务
        - id: user-order
          uri: lb://order-service
          predicates:
            - Path=/api/user/order/**
          filters:
            - RewritePath=/api/user/order/(?<segment>.*), /api/user/order/${segment}
        
        # 用户联系人服务
        - id: user-contact
          uri: lb://contact-service
          predicates:
            - Path=/api/user/contact/**
          filters:
            - RewritePath=/api/user/contact/(?<segment>.*), /api/user/contact/${segment}
        
        # 用户物流服务
        - id: user-logistics
          uri: lb://logistics-service
          predicates:
            - Path=/api/user/logistics/**
          filters:
            - RewritePath=/api/user/logistics/(?<segment>.*), /api/user/logistics/${segment}
        
        # 用户聊天服务
        - id: user-chat
          uri: lb://chat-service
          predicates:
            - Path=/api/user/chat/**
          filters:
            - RewritePath=/api/user/chat/(?<segment>.*), /chat/$\{segment}
        
        # ========== 商家端路由 ==========
        # 商家认证服务
        - id: seller-auth
          uri: lb://auth-service
          predicates:
            - Path=/api/seller/auth/**
        
        # 商家商品服务
        - id: seller-product
          uri: lb://product-service
          predicates:
            - Path=/api/seller/product/**
          filters:
            - RewritePath=/api/seller/product/(?<segment>.*), /api/seller/product/${segment}
        
        # 商家订单服务
        - id: seller-order
          uri: lb://order-service
          predicates:
            - Path=/api/seller/order/**
          filters:
            - RewritePath=/api/seller/order/(?<segment>.*), /api/seller/order/${segment}
        
        # 商家联系人服务
        - id: seller-contact
          uri: lb://contact-service
          predicates:
            - Path=/api/seller/contact/**
          filters:
            - RewritePath=/api/seller/contact/(?<segment>.*), /api/seller/contact/${segment}

        # 商家地址服务
        - id: seller-address
          uri: lb://contact-service
          predicates:
            - Path=/api/seller/address/**
          filters:
            - RewritePath=/api/seller/address/(?<segment>.*), /api/seller/address/${segment}
        
        # 商家物流服务
        - id: seller-logistics
          uri: lb://logistics-service
          predicates:
            - Path=/api/seller/logistics/**
          filters:
            - RewritePath=/api/seller/logistics/(?<segment>.*), /api/seller/logistics/${segment}
        
        # 商家聊天服务
        - id: seller-chat
          uri: lb://chat-service
          predicates:
            - Path=/api/seller/chat/**
          filters:
            - RewritePath=/api/seller/chat/(?<segment>.*), /api/seller/chat/${segment}
        
        # 商家店铺服务
        - id: seller-shop
          uri: lb://shop-service
          predicates:
            - Path=/api/seller/shop/**

# ========== 用户端路由 ==========
        # 用户店铺服务
        - id: user-shop
          uri: lb://shop-service
          predicates:
            - Path=/api/user/shop/**

# Sa-Token配置 (与auth-service保持一致)
sa-token:
  token-name: satoken
  timeout: 86400
  active-timeout: 1800
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: true
  is-read-cookie: false
  is-read-body: false
  is-read-header: true

# IP限流配置
ip-rate-limit:
  max-requests: 300
  time-window-seconds: 60

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.gzasc.aishopping.gateway: info
