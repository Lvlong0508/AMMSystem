spring:
  datasource:
    url: jdbc:h2:mem:eureka_product;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
  autoconfigure:
    exclude: org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration,org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration

eureka:
  client:
    enabled: false

order:
  timeout:
    payment-minutes: 30

app:
  image:
    base-url: http://localhost:8081
    max-file-size: 5MB
    storage-path: ./target/test-image/goods/main
    resource-location: file:./target/test-image/
  scheduler:
    reservation:
      enabled: false
      fixed-rate: 120000
      config-path: src/test/resources/application.yml
