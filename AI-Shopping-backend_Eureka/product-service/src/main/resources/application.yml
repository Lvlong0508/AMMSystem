server:
  port: 8081

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/eureka_product?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

order:
  timeout:
    payment-minutes: 30

mybatis:
  type-aliases-package: com.gzasc.aishopping.product.model
  configuration:
    map-underscore-to-camel-case: true
    default-executor-type: simple
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

app:
  image:
    base-url: http://localhost:8081
    storage-path: ${project.root:./AI-Shopping-backend_Eureka}/static/image/goods/main
    resource-location: file:${project.root:./AI-Shopping-backend_Eureka}/static/image/
