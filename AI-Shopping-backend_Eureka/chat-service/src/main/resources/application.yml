server:
  port: 8085

spring:
  application:
    name: chat-service
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# ========== Sa-Token 配置 ==========
sa-token:
  token-name: satoken
  timeout: 86400
  active-timeout: 1800
  is-concurrent: false
  is-share: false
  token-style: uuid
  is-log: true
  is-read-cookie: false
  is-read-body: false
  is-read-header: true

chat:
  memory:
    maxMessages: 10
