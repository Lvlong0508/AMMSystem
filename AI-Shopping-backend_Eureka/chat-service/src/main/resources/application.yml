server:
  port: 8085

spring:
  application:
    name: chat-service
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

langchain4j:
  dashscope:
    chat-model:
      api-key: sk-04f193be640441ecb82410f96a686368
      model-name: glm-5.1
      enable-search: false
      temperature: 0.7

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000
