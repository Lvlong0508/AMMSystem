# 测试环境配置
server:
  port: 0  # 随机端口

spring:
  application:
    name: auth-service-test

  # H2 内存数据库（测试用）
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  # Redis 配置（测试用嵌入式或禁用）
  redis:
    host: localhost
    port: 6379
    database: 1  # 使用不同数据库避免污染

# Sa-Token 配置（测试环境缩短有效期）
sa-token:
  token-name: satoken
  timeout: 3600  # 1小时
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false  # 测试环境关闭日志

# 关闭 Eureka 注册
eureka:
  client:
    enabled: false

mybatis:
  type-aliases-package: com.gzasc.aishopping.auth.model
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: warn
    com.gzasc.aishopping.auth: debug
